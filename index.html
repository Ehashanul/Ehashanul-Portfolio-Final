<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    window.onerror = function (msg, url, lineNo, columnNo, error) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0'; div.style.left = '0'; div.style.width = '100vw'; div.style.height = '100vh';
      div.style.backgroundColor = 'red'; div.style.color = 'white'; div.style.zIndex = '999999';
      div.style.padding = '20px'; div.style.fontSize = '20px'; div.style.whiteSpace = 'pre-wrap';
      div.innerText = 'ERROR:\n' + msg + '\n' + (error && error.stack ? error.stack : '');
      document.body.appendChild(div);
    };
    window.addEventListener('unhandledrejection', function (event) {
      const div = document.createElement('div');
      div.style.position = 'fixed';
      div.style.top = '0'; div.style.left = '0'; div.style.width = '100vw'; div.style.height = '100vh';
      div.style.backgroundColor = 'darkred'; div.style.color = 'white'; div.style.zIndex = '999999';
      div.style.padding = '20px'; div.style.fontSize = '20px'; div.style.whiteSpace = 'pre-wrap';
      div.innerText = 'UNHANDLED PROMISE REJECTION:\n' + (event.reason ? (event.reason.stack || event.reason) : event);
      document.body.appendChild(div);
    });
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Associate UI/UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@200;300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
</head>

<body class="bg-ink text-white font-outfit overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
